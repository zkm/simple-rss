name: CI

on:
  push:
  pull_request:

jobs:
  php:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2', '8.3', '8.4' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: dom, xml, mbstring

      - name: Lint PHP
        run: |
          set -euo pipefail
          find . -type f -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Smoke test (fetch a feed and assert items > 0)
        run: |
          set -euo pipefail
          php ci_smoke.php