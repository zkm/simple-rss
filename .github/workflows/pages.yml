name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - '**/*.php'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, xml, mbstring

      - name: Generate static demo HTML
        run: |
          set -euo pipefail
          php -S 127.0.0.1:8000 -t . >/dev/null 2>&1 &
          server_pid=$!
          # allow server to start
          for i in 1 2 3 4 5; do sleep 1; curl -fsS http://127.0.0.1:8000/ && break || true; done
          # Build a static demo page with a default feed
          curl -fsS "http://127.0.0.1:8000/index.php?feed=https%3A%2F%2Fhnrss.org%2Ffrontpage" -o public/index.html
          kill $server_pid || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4